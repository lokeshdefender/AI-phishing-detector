version: '3.8'

services:
  phishing-analyzer:
    build: .
    container_name: phishing-analyzer
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - APP_ENV=development
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_RELOAD=true
      - LOG_LEVEL=DEBUG
      - DATABASE_URL=sqlite:////app/data/investigations.db
      - EVIDENCE_STORAGE_PATH=/app/data/evidence_repository
    volumes:
      - .:/app
      - app_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  app_data:
